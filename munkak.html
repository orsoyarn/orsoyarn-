<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munkák - Orsoyarn</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('aura2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ff758f;
            text-align: center;
        }

        header {
            background-color: #ff758f;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            margin: 40px auto;
            padding: 30px;
            max-width: 900px;
            border-radius: 20px;
        }

        /* Galéria rács */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .work-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .work-item:hover { transform: translateY(-5px); }

        .work-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        /* --- MODAL (Nagyított nézet) STÍLUSA --- */
        .modal {
            display: none; /* Alapból rejtve van */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            padding-top: 50px;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 80%;
            max-height: 60vh;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Kis képek (thumbnails) alul */
        .thumbnail-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
        }

        .thumb {
            width: 80px;
            height: 60px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .thumb:hover, .thumb.active {
            opacity: 1;
            border-color: #ff758f;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: #ff758f;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">Orsoyarn Portfólió</div>
    <nav><a href="index.html" style="color: white; text-decoration: none;">Főoldal</a></nav>
</header>

<div class="container">
    <h1>Munkáim</h1>
    <div class="work-grid">
        <div class="work-item" onclick="openGallery(['szoves1.jpg', 'szoves1_kozeli.jpg', 'szoves1_muhely.jpg'])">
            <img src="Pink Studio.jpg" alt="Projekt 1">
            <h3>Pink Studio</h3>
        </div>
        
        <div class="work-item" onclick="openGallery(['karpit1.jpg', 'karpit_hatul.jpg'])">
            <img src="karpit1.jpg" alt="Projekt 2">
            <h3>Kárpit tanulmány</h3>
        </div>
    </div>
    <a href="index.html" class="back-link">⬅ Vissza</a>
</div>

<div id="myModal" class="modal">
    <span class="close" onclick="closeGallery()">&times;</span>
    <img class="modal-content" id="mainImg">
    <div class="thumbnail-container" id="thumbBox"></div>
</div>

<script>
    function openGallery(images) {
        const modal = document.getElementById("myModal");
        const mainImg = document.getElementById("mainImg");
        const thumbBox = document.getElementById("thumbBox");
        
        modal.style.display = "block";
        mainImg.src = images[0]; // Első kép lesz a nagy
        
        thumbBox.innerHTML = ""; // Kiürítjük a régi kis képeket
        
        images.forEach((imgSrc, index) => {
            let img = document.createElement("img");
            img.src = imgSrc;
            img.className = "thumb" + (index === 0 ? " active" : "");
            img.onclick = function() {
                mainImg.src = imgSrc; // Ha rákattintasz a kicsire, ez lesz a nagy
                document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            };
            thumbBox.appendChild(img);
        });
    }

    function closeGallery() {
        document.getElementById("myModal").style.display = "none";
    }

    // Bezárás ha mellékattintasz
    window.onclick = function(event) {
        if (event.target == document.getElementById("myModal")) closeGallery();
    }
</script>

</body>
</html>
