  <style>
    body {
 margin: 0;
      font-family: Arial, sans-serif;
      background: url('aura2.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    header {
      background-color: #ff758f;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
    }

    nav a {
      text-decoration: none;
      margin: 0 10px;
    }

      button {
      background-color: white;
      color: #ffccd5;
      border: none;
      outline: none; /* removes black outline */
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    button:focus {
      outline: none; /* removes outline on click */
    }
       button:hover {
      background-color: #eee;
      /* NEW GLOW EFFECT BELOW */
      box-shadow: 0 0 15px rgba(255, 255, 255, 1,5),
                  0 0 30px rgba(255, 255, 255, 0.7),
                  0 0 45px rgba(255, 255, 255, 0.5);
      /* NEW SCALE EFFECT */
      transform: translateY(-2px) scale(1.05);
    }

    button:hover {
      background-color: #eee;
    }

    .content {
      margin-top: 100px;
      font-size: 24px;
    }
  </style>
