<!DOCTYPE html>
<html>
<head>
  <title>orsoyarn-</title>
  <style>
    body {
      background-color: #ffe4ec; /* soft pink */
      font-family: Georgia, serif;
      margin: 0;
      padding: 0;
    }

    .letter {
      background-color: white;
      width: 60%;
      margin: 50px auto;
      padding: 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      border-radius: 8px;
    }

    .letterhead {
      text-align: center;
      border-bottom: 2px solid #f8c8d8;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    .letterhead h1 {
      margin: 0;
      color: #d63384;
    }

    .letterhead p {
      margin: 5px 0;
      font-size: 14px;
      color: #888;
    }

    .content {
      font-size: 18px;
      line-height: 1.6;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="letter">
    <div class="letterhead">
      <h1>Your Name</h1>
      <p>your@email.com | your website</p>
    </div>

    <div class="content">
      <p>Hello 👋</p>

      <p>
        Welcome to my website! This is my first GitHub Pages site,
        styled like a letter with a soft pink theme.
      </p>

      <p>
        You can write anything here—introduce yourself, share your work,
        or turn this into a blog.
      </p>

      <p>Best,<br>Your Name</p>
    </div>
  </div>

</body>
</html>
