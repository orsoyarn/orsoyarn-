<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orsoyarn - Főoldal</title>
  
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif; 
            background: url('aura2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; /* Alapértelmezett szövegszín fehér */
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Főcímek színe: Rózsaszín */
        h1, h2, h3 {
            color: #ff758f;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header {
            background-color: transparent; /* Eltávolítottuk a fehér hátteret/csíkot */
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* box-shadow törölve, hogy ne legyen csík */
        }

        nav a {
            text-decoration: none;
            margin-left: 15px;
        }

        button {
            background-color: white;
            color: #ff758f;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.4);
        }

        .hero-section {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.15); /* Enyhe sötétítés a jobb olvashatóságért */
        }

        .hero-text {
            max-width: 700px;
            padding: 20px;
        }

        .hero-text h2 {
            font-size: 3.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        /* Bemutatkozó szöveg stílusa (Fehér) */
        .intro-p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-top: 20px;
            color: white; 
        }
    </style>
</head>
<body>

<header>
    <h1>Orsoyarn</h1>
    <nav>
        <a href="about.html"><button>Rólam</button></a>
        <a href="munkak.html"><button>Munkák</button></a>
        <a href="contact.html"><button>Elérhetőség</button></a>
    </nav>
</header>

<div class="hero-section">
    <div class="hero-text">
        <h2>Üdvözöllek!</h2>
        <p style="font-weight: bold; color: white;">Lux Orsolya | Textil- és kárpitművész hallgató</p>
        
        <p class="intro-p">
            Itt kezdheted el írni a bemutatkozásodat. Mesélj a munkáidról, 
            a stílusodról vagy arról, mi inspirál a textilek alkotása közben. 
            Ez a szöveg már fehéren fog megjelenni a rózsaszín cím alatt.
        </p>
    </div>
</div>

</body>
</html>
